services:
  - type: web
    name: aura-ml-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn predict:app --bind 0.0.0.0:$PORT --timeout 120 --workers 1
    envVars:
      - key: FLASK_ENV
        value: production
      - key: CORS_ORIGINS
        # ⚠️  Override this in Render dashboard with your actual Vercel URL:
        # e.g. https://your-app.vercel.app
        # Using "*" is fine for development but should be locked down in production.
        value: "*"
      - key: PYTHON_VERSION
        value: "3.11.0"
    healthCheckPath: /
    plan: free
